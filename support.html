<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LarpVPN | Support Center v4.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scanline"></div>

    <header>
        <div class="logo-wrap">
            <div class="logo-icon"></div>
            <div class="logo-text">LARP<span>_SUPPORT</span></div>
        </div>
        <nav id="main-nav">
            <a href="index.html" class="nav-item">ГЛАВНАЯ</a>
            <a href="dashboard.html" class="nav-item">ДАШБОРД</a>
            <span id="root-status" style="display: none; color: var(--error); font-family: 'Orbitron'; font-size: 0.65rem; border: 1px solid var(--error); padding: 2px 10px; margin-left: 20px; box-shadow: 0 0 10px var(--error-glow);">ROOT_ACCESS_GRANTED</span>
        </nav>
    </header>

    <main style="padding: 50px 8%; max-width: 1200px; margin: 0 auto; animation: fadeIn 0.8s var(--ease-cyber);">
        
        <!-- 1. ИНТЕРФЕЙС ЮЗЕРА (ОТПРАВКА ТИКЕТА) -->
        <section id="user-view" class="terminal-card" style="max-width: 800px; margin: 0 auto;">
            <div class="status-bar"><span>NEW_SECURE_TICKET</span></div>
            <h2 style="font-family: 'Orbitron'; margin-bottom: 25px; letter-spacing: 3px;">СВЯЗЬ С ОПЕРАТОРОМ</h2>
            
            <form id="ticket-form" style="display: flex; flex-direction: column; gap: 25px;">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div>
                        <label style="font-family:'JetBrains Mono'; font-size:0.6rem; color:var(--accent);">SENDER_ID</label>
                        <input type="text" id="user-id-readonly" readonly style="opacity: 0.6; cursor: not-allowed;">
                    </div>
                    <div>
                        <label style="font-family:'JetBrains Mono'; font-size:0.6rem; color:var(--accent);">PRIORITY_LEVEL</label>
                        <select style="background: rgba(0,0,0,0.5); border: 1px solid var(--accent-border); color: #fff; padding: 12px; font-family:'JetBrains Mono'; outline:none; border-left: 3px solid var(--info);">
                            <option>LOW_PRIORITY</option>
                            <option>CRITICAL_ISSUE</option>
                            <option>BILLING_ERROR</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label style="font-family:'JetBrains Mono'; font-size:0.6rem; color:var(--accent);">MESSAGE_DATA_ENCRYPTED</label>
                    <textarea id="ticket-msg" required placeholder="Введите ваше сообщение... Админ ответит в ближайшее время." style="height: 200px; resize: none;"></textarea>
                </div>

                <button type="submit" class="btn-main" style="width: 100%; padding: 20px;">TRANSMIT_DATA_TO_ROOT</button>
            </form>
        </section>

        <!-- 2. ИНТЕРФЕЙС АДМИНА (ОЧЕРЕДЬ ЗАПРОСОВ) -->
        <section id="admin-view" style="display: none;">
            <div class="terminal-card" style="border-color: var(--warning); margin-bottom: 30px;">
                <div class="status-bar"><div class="indicator" style="background:var(--warning)"></div><span style="color:var(--warning)">ACTIVE_TICKETS_BUFFER</span></div>
                <h2 style="font-family: 'Orbitron'; color: var(--warning); letter-spacing: 5px;">ADMIN_TERMINAL_ROOT</h2>
            </div>
            
            <div id="tickets-buffer" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 25px;">
                <!-- Сюда скрипт вставляет тикеты -->
            </div>
        </section>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = localStorage.getItem('userLogin') || 'ANONYMOUS_USER';
            const isAdmin = (currentUser.toLowerCase() === 'admin' || currentUser.toLowerCase() === 'klyarskiy@gmail.com');

            const userView = document.getElementById('user-view');
            const adminView = document.getElementById('admin-view');
            const rootStatus = document.getElementById('root-status');
            const userReadonly = document.getElementById('user-id-readonly');

            userReadonly.value = currentUser.toUpperCase();

            // ПЕРЕКЛЮЧЕНИЕ РОЛЕЙ
            if (isAdmin) {
                userView.style.display = 'none';
                adminView.style.display = 'block';
                rootStatus.style.display = 'inline-block';
                renderTickets();
            }

            // ОТПРАВКА ЮЗЕРОМ
            document.getElementById('ticket-form')?.addEventListener('submit', (e) => {
                e.preventDefault();
                const msg = document.getElementById('ticket-msg').value;
                
                let tickets = JSON.parse(localStorage.getItem('sysTickets')) || [];
                tickets.push({
                    id: Date.now(),
                    user: currentUser,
                    content: msg,
                    time: new Date().toLocaleTimeString()
                });
                
                localStorage.setItem('sysTickets', JSON.stringify(tickets));
                alert('[ SYSTEM ]: ТИКЕТ УСПЕШНО ОТПРАВЛЕН В ОЧЕРЕДЬ');
                e.target.reset();
            });

            // ОТРИСОВКА ДЛЯ АДМИНА
            function renderTickets() {
                const buffer = document.getElementById('tickets-buffer');
                let tickets = JSON.parse(localStorage.getItem('sysTickets')) || [];

                if (tickets.length === 0) {
                    buffer.innerHTML = `<div class="terminal-card" style="grid-column: 1/-1; text-align: center; color: var(--t-low);">[ ОЧЕРЕДЬ ТИКАЕТ ПУСТОТОЙ... ЗАПРОСОВ НЕТ ]</div>`;
                    return;
                }

                buffer.innerHTML = tickets.map(t => `
                    <div class="terminal-card" style="border-left: 4px solid var(--info); animation: fadeIn 0.4s var(--ease-cyber);">
                        <div class="status-bar"><span>FROM: ${t.user.toUpperCase()}</span><span style="margin-left: auto;">${t.time}</span></div>
                        <p style="font-family:'JetBrains Mono'; font-size:0.85rem; margin-bottom: 20px; line-height: 1.6;">${t.content}</p>
                        <div style="display: flex; gap: 10px;">
                            <input type="text" placeholder="Введите ответ..." id="reply-${t.id}" style="font-size: 0.7rem; padding: 8px;">
                            <button onclick="resolveTicket(${t.id})" class="btn-main" style="padding: 10px 20px; font-size: 0.6rem; border-color: var(--info); color: var(--info);">REPLY_&_CLOSE</button>
                        </div>
                    </div>
                `).join('');
            }

            // ОТВЕТ АДМИНА
            window.resolveTicket = (id) => {
                const reply = document.getElementById(`reply-${id}`).value;
                if (!reply) return alert('Введите текст ответа!');

                let tickets = JSON.parse(localStorage.getItem('sysTickets'));
                tickets = tickets.filter(t => t.id !== id);
                localStorage.setItem('sysTickets', JSON.stringify(tickets));
                
                alert(`[ SYSTEM ]: ОТВЕТ ОТПРАВЛЕН ПОЛЬЗОВАТЕЛЮ ${id}`);
                renderTickets();
            };
        });
    </script>

    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</body>
</html>
