<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LarpVPN | Support Center v7.0</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Анимации и стили для 100% стабильности */
        #user-view, #admin-view { display: none; }
        .ticket-item { 
            border-left: 5px solid var(--accent); 
            margin-bottom: 25px; 
            background: rgba(0, 255, 163, 0.02);
            animation: slideIn 0.4s ease-out;
        }
        @keyframes slideIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }
        
        .admin-badge {
            color: var(--error);
            border: 1px solid var(--error);
            padding: 2px 10px;
            font-family: 'Orbitron';
            font-size: 0.6rem;
            box-shadow: 0 0 10px var(--error-glow);
        }
    </style>
</head>
<body>
    <div class="scanline"></div>

    <header>
        <div class="logo-wrap">
            <div class="logo-icon"></div>
            <div class="logo-text">LARP<span>_SUPPORT</span></div>
        </div>
        <nav id="main-nav">
            <a href="index.html" class="nav-item">ГЛАВНАЯ</a>
            <a href="dashboard.html" class="nav-item">ДАШБОРД</a>
            <span id="admin-indicator" class="admin-badge" style="display:none;">ROOT_ACCESS</span>
        </nav>
    </header>

    <main style="padding: 60px 8%; max-width: 1200px; margin: 0 auto;">
        
        <!-- ЧАСТЬ 1: ФОРМА ДЛЯ ЮЗЕРА -->
        <section id="user-view">
            <div class="terminal-card" style="max-width: 800px; margin: 0 auto; border-top: 4px solid var(--accent);">
                <div class="status-bar"><span>SECURE_CHANNEL: ACTIVE</span></div>
                <h2 style="font-family:'Orbitron'; margin-bottom:30px; letter-spacing:4px;">СВЯЗЬ С ОПЕРАТОРОМ</h2>
                
                <form id="ticket-form-main">
                    <label style="font-family:monospace; font-size:0.7rem; color:var(--accent); display:block; margin-bottom:10px;">ID_ОПЕРАТОРА (ВЫ)</label>
                    <input type="text" id="my-login" readonly style="opacity:0.6; margin-bottom:20px;">
                    
                    <label style="font-family:monospace; font-size:0.7rem; color:var(--accent); display:block; margin-bottom:10px;">MESSAGE_ENCRYPTED</label>
                    <textarea id="my-message" required placeholder="Опишите проблему... Админ ответит здесь." style="height:200px; margin-bottom:25px;"></textarea>
                    
                    <button type="submit" class="btn-main" style="width:100%; padding:20px;">TRANSMIT_DATA</button>
                </form>
            </div>
        </section>

        <!-- ЧАСТЬ 2: ПАНЕЛЬ ДЛЯ АДМИНА -->
        <section id="admin-view">
            <div class="terminal-card" style="border-color: var(--warning); margin-bottom: 40px; display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <h2 style="font-family:'Orbitron'; color:var(--warning);">ADMIN_QUEUE_MANAGER</h2>
                    <p style="font-size:0.6rem; color:var(--t-low); font-family:monospace; margin-top:5px;">DATABASE: ULTIMATE_DB_v7 | TICKETS: <span id="t-count" style="color:var(--warning)">0</span></p>
                </div>
                <button onclick="cleanDB()" class="btn-main" style="border-color:var(--error); color:var(--error); font-size:0.6rem;">WIPE_DB</button>
            </div>

            <div id="tickets-render-zone">
                <!-- Сюда влетят сообщения -->
            </div>
        </section>

    </main>

    <script>
        // ЕДИНЫЙ КЛЮЧ - ОДИН ДЛЯ ВСЕХ
        const MASTER_KEY = 'ULTIMATE_TICKET_DB_STABLE';

        document.addEventListener('DOMContentLoaded', () => {
            // 1. Кто сейчас залогинен?
            const user = localStorage.getItem('userLogin') || 'GUEST';
            const admins = ['admin', 'grisha', 'klyarskiy@gmail.com'];
            const isAdmin = admins.includes(user.toLowerCase());

            // Элементы
            const uView = document.getElementById('user-view');
            const aView = document.getElementById('admin-view');
            const myLoginInput = document.getElementById('my-login');
            const indicator = document.getElementById('admin-indicator');

            myLoginInput.value = user.toUpperCase();

            // 2. Показываем нужный интерфейс
            if (isAdmin) {
                aView.style.display = 'block';
                indicator.style.display = 'inline-block';
                renderForAdmin();
            } else {
                uView.style.display = 'block';
            }

            // 3. ЛОГИКА ОТПРАВКИ (ДЛЯ ЮЗЕРА)
            document.getElementById('ticket-form-main')?.addEventListener('submit', (e) => {
                e.preventDefault();
                const text = document.getElementById('my-message').value;

                if(!text.trim()) return;

                // Берем текущие тикеты
                let tickets = JSON.parse(localStorage.getItem(MASTER_KEY)) || [];
                
                // Добавляем новый
                tickets.push({
                    id: Date.now(),
                    sender: user,
                    body: text,
                    time: new Date().toLocaleTimeString()
                });

                // Сохраняем обратно
                localStorage.setItem(MASTER_KEY, JSON.stringify(tickets));

                alert('[ SYSTEM ]: ТИКЕТ УСПЕШНО ПЕРЕДАН В ОЧЕРЕДЬ');
                document.getElementById('my-message').value = '';
            });
        });

        // 4. ЛОГИКА ОТОБРАЖЕНИЯ (ДЛЯ АДМИНА)
        function renderForAdmin() {
            const container = document.getElementById('tickets-render-zone');
            const countLabel = document.getElementById('t-count');
            const data = JSON.parse(localStorage.getItem(MASTER_KEY)) || [];

            countLabel.innerText = data.length;

            if (data.length === 0) {
                container.innerHTML = '<div class="terminal-card" style="text-align:center; padding:50px; color:var(--t-low);">-- ОЧЕРЕДЬ ТИКЕТОВ ПУСТА --</div>';
                return;
            }

            // Рендерим список
            container.innerHTML = data.reverse().map(t => `
                <div class="terminal-card ticket-item">
                    <div class="status-bar">
                        <span>FROM: <b style="color:#fff">${t.sender.toUpperCase()}</b></span>
                        <span style="margin-left:auto; opacity:0.6">${t.time}</span>
                    </div>
                    <p style="font-family:monospace; font-size:0.9rem; line-height:1.6; margin-bottom:20px;">${t.body}</p>
                    <div style="display:flex; gap:15px;">
                        <input type="text" id="reply-${t.id}" placeholder="Ваш ответ..." style="font-size:0.7rem; flex:1;">
                        <button onclick="resolve('${t.id}')" class="btn-main" style="border-color:var(--info); color:var(--info); font-size:0.6rem; padding:10px 25px;">CLOSE_TICKET</button>
                    </div>
                </div>
            `).join('');
        }

        // 5. УДАЛИТЬ/ЗАКРЫТЬ ТИКЕТ
        window.resolve = (id) => {
            let data = JSON.parse(localStorage.getItem(MASTER_KEY)) || [];
            data = data.filter(t => t.id.toString() !== id.toString());
            localStorage.setItem(MASTER_KEY, JSON.stringify(data));
            renderForAdmin(); // Обновляем список сразу
            alert('Тикет закрыт.');
        };

        // 6. ПОЛНАЯ ОЧИСТКА (ДЛЯ ТЕСТОВ)
        window.cleanDB = () => {
            if(confirm('СТЕРЕТЬ ВСЕ ТИКЕТЫ?')) {
                localStorage.setItem(MASTER_KEY, '[]');
                renderForAdmin();
            }
        };
    </script>
</body>
</html>
