<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LarpVPN | Авторизация в терминале</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scanline"></div>

    <main style="height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
        
        <!-- ЛОАДЕР (ПОЯВЛЯЕТСЯ ПРИ ВХОДЕ) -->
        <div id="loader" style="display: none; text-align: center; animation: fadeIn 0.5s var(--ease-cyber);">
            <div class="logo-icon" style="width: 80px; height: 80px; margin: 0 auto 30px; animation: rotate 1.5s linear infinite; filter: drop-shadow(0 0 20px var(--accent));"></div>
            <h2 class="logo-text" style="letter-spacing: 10px;">DECRYPTING<span>...</span></h2>
            <p id="load-status" style="font-family: 'JetBrains Mono'; color: var(--accent); margin-top: 15px; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase;">SYNCHRONIZING_CORE_KEYS [0%]</p>
        </div>

        <!-- КАРТОЧКА ВХОДА -->
        <div id="login-card" class="terminal-card" style="width: 100%; max-width: 440px; padding: 60px 45px; border-bottom: 5px solid var(--accent); animation: fadeIn 0.8s var(--ease-cyber);">
            <div class="logo-wrap" style="justify-content: center; margin-bottom: 45px;">
                <div class="logo-icon" style="width: 40px; height: 40px;"></div>
                <div class="logo-text" style="font-size: 1.6rem;">SYSTEM<span>_AUTH</span></div>
            </div>

            <!-- СООБЩЕНИЕ ОБ ОШИБКЕ -->
            <div id="auth-error" style="display: none; border: 1px solid var(--error); background: rgba(255, 71, 71, 0.05); color: var(--error); padding: 12px; font-family:'JetBrains Mono'; font-size: 0.7rem; margin-bottom: 25px; text-align: center; border-left: 4px solid var(--error);">
                [!] ACCESS_DENIED: INVALID_CREDENTIALS
            </div>

            <form id="auth-form" style="display: flex; flex-direction: column; gap: 25px;">
                <div style="text-align: left;">
                    <label style="font-family: 'JetBrains Mono'; font-size: 0.6rem; color: var(--accent); margin-bottom: 10px; display: block; letter-spacing: 2px;">IDENTIFIER (LOGIN)</label>
                    <input type="text" id="login-id" required placeholder="USER_NICKNAME" autocomplete="off">
                </div>

                <div style="text-align: left;">
                    <label style="font-family: 'JetBrains Mono'; font-size: 0.6rem; color: var(--accent); margin-bottom: 10px; display: block; letter-spacing: 2px;">ACCESS_KEY (PASSWORD)</label>
                    <input type="password" id="login-pass" required placeholder="••••••••••••">
                </div>

                <button type="submit" class="btn-main" style="width: 100%; margin-top: 15px; padding: 20px; font-size: 0.9rem;">GRANT_ACCESS</button>
            </form>

            <div style="margin-top: 40px; padding-top: 25px; border-top: 1px solid var(--accent-border); display: flex; flex-direction: column; gap: 15px; font-size: 0.7rem; font-family: 'JetBrains Mono';">
                <a href="register.html" style="color: var(--accent); text-decoration: none; font-weight: 800; letter-spacing: 1px; transition: 0.3s;" onmouseover="this.style.textShadow='0 0 10px var(--accent)'" onmouseout="this.style.textShadow='none'">> INITIALIZE_NEW_ID</a>
                <a href="#" style="color: var(--t-low); text-decoration: none;">> RECOVER_LOST_KEY</a>
            </div>
        </div>

    </main>

    <script>
        document.getElementById('auth-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const card = document.getElementById('login-card');
            const loader = document.getElementById('loader');
            const status = document.getElementById('load-status');
            const errorBox = document.getElementById('auth-error');

            const loginVal = document.getElementById('login-id').value.trim();
            const passVal = document.getElementById('login-pass').value;

            // 1. ПРОВЕРКА В "БАЗЕ" (LocalStorage)
            let allUsers = JSON.parse(localStorage.getItem('allUsers')) || [];
            const userFound = allUsers.find(u => u.login.toLowerCase() === loginVal.toLowerCase() && u.pass === passVal);

            if (!userFound) {
                errorBox.innerText = `[!] ОШИБКА: НЕВЕРНЫЙ ЛОГИН ИЛИ КЛЮЧ`;
                errorBox.style.display = 'block';
                return;
            }

            // 2. ЕСЛИ ВСЕ ВЕРНО — ЗАПУСКАЕМ ИМИТАЦИЮ ВХОДА
            card.style.display = 'none';
            loader.style.display = 'block';
            errorBox.style.display = 'none';
            
            let progress = 0;
            const logSteps = [
                "REQUESTING_ACCESS...",
                "VALIDATING_USER_ID...",
                "OPENING_SECURE_TUNNEL...",
                "ACCESS_GRANTED_BY_CORE"
            ];

            let interval = setInterval(() => {
                progress += Math.floor(Math.random() * 25);
                if (progress > 100) progress = 100;
                
                const step = Math.min(Math.floor(progress / 30), logSteps.length - 1);
                status.innerText = `${logSteps[step]} [${progress}%]`;
                
                if (progress === 100) {
                    clearInterval(interval);
                    localStorage.setItem('userLogin', userFound.login); // Ставим сессию
                    setTimeout(() => window.location.href = 'dashboard.html', 600);
                }
            }, 450);
        });
    </script>

    <style>
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes rotate { from { transform: rotate(45deg); } to { transform: rotate(405deg); } }
    </style>

</body>
</html>
