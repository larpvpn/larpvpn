<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LarpVPN | Инициализация нового ID</title>
    <!-- Подключаем твой основной стиль -->
    <link rel="stylesheet" href="style.css">
    <style>
        /* Анимация появления */
        body { animation: fadeIn 0.8s cubic-bezier(0.19, 1, 0.22, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Индикатор сложности */
        .strength-bar { display: flex; gap: 5px; margin-top: 10px; }
        .bar-node { height: 4px; flex: 1; background: var(--t-low); transition: 0.3s; }
    </style>
</head>
<body>
    <div class="scanline"></div>

    <main style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
        
        <div class="terminal-card" style="width: 100%; max-width: 450px; border-top: 5px solid var(--accent);">
            <div class="logo-wrap" style="justify-content: center; margin-bottom: 40px;">
                <div class="logo-icon"></div>
                <div class="logo-text">NEW<span>_IDENTITY</span></div>
            </div>

            <!-- БЛОК ОШИБОК (скрыт по умолчанию) -->
            <div id="reg-error" style="display: none; border: 1px solid var(--error); background: rgba(255, 71, 71, 0.05); color: var(--error); padding: 12px; font-family:'JetBrains Mono'; font-size: 0.7rem; margin-bottom: 20px; text-align: center;">
                [!] SYSTEM_ERROR: DATA_REJECTED
            </div>

            <form id="reg-form">
                <!-- ЛОГИН -->
                <div style="margin-bottom: 20px;">
                    <label style="font-family:'JetBrains Mono'; font-size: 0.6rem; color: var(--accent); letter-spacing: 2px;">01_IDENTIFIER (LOGIN)</label>
                    <input type="text" id="reg-login" required placeholder="NICKNAME" autocomplete="off" style="margin-top: 5px;">
                </div>

                <!-- ПАРОЛЬ -->
                <div style="margin-bottom: 25px;">
                    <label style="font-family:'JetBrains Mono'; font-size: 0.6rem; color: var(--accent); letter-spacing: 2px;">02_ACCESS_KEY (PASSWORD)</label>
                    <input type="password" id="reg-pass" required placeholder="••••••••" style="margin-top: 5px;">
                    
                    <!-- Индикатор сложности -->
                    <div class="strength-bar">
                        <div class="bar-node"></div>
                        <div class="bar-node"></div>
                        <div class="bar-node"></div>
                        <div class="bar-node"></div>
                    </div>
                </div>

                <button type="submit" class="btn-main" style="width: 100%; padding: 18px; font-size: 0.8rem;">INITIALIZE_SECURE_ID</button>
            </form>

            <div style="margin-top: 35px; text-align: center; border-top: 1px solid var(--accent-border); padding-top: 25px;">
                <p style="font-family:'JetBrains Mono'; font-size: 0.7rem; color: var(--t-mid);">
                    УЖЕ ЕСТЬ ДОСТУП? <a href="login.html" style="color: var(--accent); text-decoration: none; font-weight: bold;">LOG_IN_SYSTEM</a>
                </p>
            </div>
        </div>

    </main>

    <script>
        document.getElementById('reg-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const loginInput = document.getElementById('reg-login');
            const passInput = document.getElementById('reg-pass');
            const errorBox = document.getElementById('reg-error');
            
            const login = loginInput.value.trim();
            const pass = passInput.value;

            // 1. Загружаем базу пользователей
            let allUsers = JSON.parse(localStorage.getItem('allUsers')) || [];

            // 2. Проверка на уникальность логина
            const isDuplicate = allUsers.some(u => u.login.toLowerCase() === login.toLowerCase());

            if (isDuplicate) {
                errorBox.innerText = `[!] ОШИБКА: ЛОГИН "${login.toUpperCase()}" УЖЕ ЗАНЯТ`;
                errorBox.style.display = 'block';
                loginInput.style.borderColor = 'var(--error)';
                return;
            }

            // 3. Сохранение (Логин + Пароль!)
            // ВАЖНО: Мы сохраняем объект с полем "pass", чтобы логин мог его проверить
            allUsers.push({ 
                login: login, 
                pass: pass 
            });

            localStorage.setItem('allUsers', JSON.stringify(allUsers));
            
            // 4. Установка текущей сессии
            localStorage.setItem('userLogin', login);

            // 5. Редирект в Дашборд
            window.location.href = 'dashboard.html';
        });

        // Визуальный эффект сложности пароля
        document.getElementById('reg-pass').addEventListener('input', function() {
            const nodes = document.querySelectorAll('.bar-node');
            let val = this.value;
            let score = Math.min(4, Math.floor(val.length / 2));
            
            nodes.forEach((n, i) => {
                if (i < score) {
                    n.style.background = 'var(--accent)';
                    n.style.boxShadow = '0 0 10px var(--accent)';
                } else {
                    n.style.background = 'var(--t-low)';
                    n.style.boxShadow = 'none';
                }
            });
        });
    </script>
</body>
</html>
